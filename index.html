<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GoodCafe 配置ツール（元のタイル版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #0f172a;
  color: #e2e8f0;
  font-family: system-ui, sans-serif;
}

/* 全体レイアウト：3段構成 */
#container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto 1fr;
  gap: 10px;
  padding: 10px;
}

@media (max-width: 900px) {
  #container {
    grid-template-columns: 1fr;
  }
}

/* ------------------------------
   キャラタイル（元の縦スクロール）
------------------------------ */
#characterPanel {
  background: #1e293b;
  border-radius: 6px;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
}

.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 6px;
}

.char-tile {
  background: #334155;
  border-radius: 6px;
  padding: 6px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #475569;
}

.char-tile.selected {
  background: #0ea5e9;
  border-color: #38bdf8;
}

.char-name {
  font-size: 12px;
  line-height: 1.2;
}

/* ------------------------------
   家具タイル（元の縦スクロール）
------------------------------ */
#furniturePanel {
  background: #1e293b;
  border-radius: 6px;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
}

.furniture-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}

.furniture-tile {
  background: #334155;
  border-radius: 6px;
  border: 1px solid #475569;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.furniture-header {
  display: flex;
  gap: 6px;
}

.furniture-header img {
  width: 60px;
  height: 40px;
  border-radius: 4px;
  object-fit: cover;
  background: #475569;
}

.furniture-name {
  font-size: 12px;
  line-height: 1.2;
}

.furniture-rarity {
  font-size: 11px;
  color: #fbbf24;
}

.furniture-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.furniture-footer input {
  width: 50px;
  background: #0f172a;
  border: 1px solid #64748b;
  border-radius: 4px;
  color: #e2e8f0;
}

/* ------------------------------
   設定パネル（元の形式）
------------------------------ */
#settingsPanel {
  background: #1e293b;
  border-radius: 6px;
  padding: 10px;
}

.settings-row {
  margin-bottom: 8px;
  font-size: 14px;
}

.settings-row input {
  width: 60px;
  background: #0f172a;
  border: 1px solid #64748b;
  border-radius: 4px;
  color: #e2e8f0;
  padding: 2px 4px;
}

/* ------------------------------
   結果パネル（元の縦リスト）
------------------------------ */
#resultPanel {
  background: #1e293b;
  border-radius: 6px;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
}

.result-item {
  background: #334155;
  border: 1px solid #475569;
  border-radius: 6px;
  padding: 6px;
  margin-bottom: 6px;
}

.result-main {
  display: flex;
  justify-content: space-between;
}

.result-name {
  font-size: 13px;
}

.result-score {
  font-size: 13px;
  color: #a5b4fc;
}

.result-sub {
  font-size: 11px;
  color: #94a3b8;
}
</style>
</head>

<body>

<h2 style="padding:10px; margin:0;">GoodCafe 配置ツール（元のタイル版）</h2>

<div id="container">

  <!-- キャラ -->
  <div id="characterPanel">
    <div style="font-size:14px; margin-bottom:6px;">育成したいキャラ</div>
    <div class="char-grid" id="characterGrid"></div>
  </div>

  <!-- 家具 -->
  <div id="furniturePanel">
  <div style="font-size:14px; margin-bottom:6px;">
    家具の所持数　
    <select id="sortFurniture">
      <option value="default">デフォルト順</option>
      <option value="rarity">レアリティ順</option>
      <option value="name">名前順</option>
    </select>
  </div>
  <div class="furniture-grid" id="furnitureGrid"></div>
</div>

  <!-- 設定 -->
  <div id="settingsPanel">
    <div class="settings-row">
      製造可能数：  
      ★1 <input id="make1" type="number" min="0" value="0">　
      ★2 <input id="make2" type="number" min="0" value="0">　
      ★3 <input id="make3" type="number" min="0" value="0">
    </div>

    <div class="settings-row">
      カフェ空きスペース：  
      <input id="cafeSpace" type="number" min="0" value="0">
    </div>

    <button id="calcBtn" style="
      margin-top:10px;
      padding:6px 12px;
      background:#0ea5e9;
      border:none;
      border-radius:4px;
      color:white;
      cursor:pointer;
    ">計算する</button>
  </div>

  <!-- 結果 -->
  <div id="resultPanel">
    <div style="font-size:14px; margin-bottom:6px;">結果</div>
    <div id="resultList"></div>
  </div>

</div>

<!-- データ読み込み -->
<script src="./data.js"></script>

<script>
/* ============================================================
   キャラタイル生成（元の縦スクロール）
============================================================ */
const characterGrid = document.getElementById("characterGrid");
const selectedCharacters = new Set();

characters.forEach(c => {
  const div = document.createElement("div");
  div.className = "char-tile";
  div.dataset.id = c.id;

  div.innerHTML = `<div class="char-name">${c.name}</div>`;

  div.addEventListener("click", () => {
    if (selectedCharacters.has(c.id)) {
      selectedCharacters.delete(c.id);
      div.classList.remove("selected");
    } else {
      selectedCharacters.add(c.id);
      div.classList.add("selected");
    }
  });

  characterGrid.appendChild(div);
});

/* ============================================================
   家具タイル生成（元の縦スクロール）
============================================================ */
const furnitureGrid = document.getElementById("furnitureGrid");
const furnitureCount = new Map();

function renderFurnitureList(list) {
  furnitureGrid.innerHTML = "";

  list.forEach(f => {
    const div = document.createElement("div");
    div.className = "furniture-tile";

    const imgPath = `./images/furniture/${f.name}.png`;
    const rarityStars = "★".repeat(f.rarity);

    div.innerHTML = `
      <div class="furniture-header">
        <img src="${imgPath}" onerror="this.src='./images/furniture_dummy/dummy.png'">
        <div>
          <div class="furniture-name">${f.name}</div>
          <div class="furniture-rarity">${rarityStars}</div>
        </div>
      </div>

      <div class="furniture-footer">
        <span style="font-size:11px;">所持</span>
        <input type="number" min="0" value="0" data-id="${f.id}">
      </div>
    `;

    const input = div.querySelector("input");
    input.addEventListener("input", () => {
      furnitureCount.set(f.id, Number(input.value));
    });

    furnitureGrid.appendChild(div);
  });
}

/* ============================================================
   計算ボタン → 結果表示（元の形式）
============================================================ */
document.getElementById("calcBtn").addEventListener("click", () => {
  const make1 = Number(document.getElementById("make1").value);
  const make2 = Number(document.getElementById("make2").value);
  const make3 = Number(document.getElementById("make3").value);

  results.sort((a, b) => b.score - a.score);

  const resultList = document.getElementById("resultList");
  resultList.innerHTML = "";

  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "result-item";

    div.innerHTML = `
      <div class="result-main">
        <div class="result-name">${r.name}</div>
        <div class="result-score">${r.score}</div>
      </div>
      <div class="result-sub">
        対応キャラ: ${r.matchCount} / 所持: ${r.count} / ★${r.rarity}
      </div>
    `;

    resultList.appendChild(div);
  });
});

  document.getElementById("sortFurniture").addEventListener("change", e => {
  const mode = e.target.value;
  let sorted = [...furnitures];

  if (mode === "rarity") {
    sorted.sort((a, b) => b.rarity - a.rarity || a.id - b.id);
  } else if (mode === "name") {
    sorted.sort((a, b) => a.name.localeCompare(b.name, "ja"));
  } else {
    sorted.sort((a, b) => a.id - b.id); // デフォルト
  }

  renderFurnitureList(sorted);
});
</script>

</body>
</html>
