<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>育成支援ツール</title>
<style>
  body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
  h2 { margin: 10px 0; }
  .container { padding: 16px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .section { background: white; padding: 12px; border-radius: 8px; flex: 1; min-width: 300px; }
  .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; max-height: 300px; overflow-y: auto; padding: 4px; }
  .char-tile, .furniture-tile { background: #fafafa; border-radius: 6px; padding: 6px; text-align: center; cursor: pointer; border: 1px solid #ddd; }
  .char-tile.selected { border: 2px solid #007bff; }
  .dummy-img { width: 60px; height: 40px; background: #ccc; margin: 0 auto 4px; border-radius: 4px; }
  .btn { padding: 12px 18px; background: #007bff; color: white; border-radius: 6px; display: inline-block; cursor: pointer; margin-top: 10px; }
  .result-card { background: white; padding: 12px; margin: 10px 0; border-radius: 8px; }
</style>
</head>
<body>

<div class="container">

  <!-- 上段：キャラ選択 & 家具所持数 -->
  <div class="row">
    <div class="section">
      <h2>① 育成したいキャラ</h2>
      <div id="charGrid" class="tile-grid"></div>
    </div>

    <div class="section">
      <h2>② 家具の所持数</h2>
      <div id="furnitureGrid" class="tile-grid"></div>
    </div>
  </div>

  <!-- 中段：ランク別製造可能数 & カフェ空きスペース -->
  <div class="row">
    <div class="section">
      <h2>③ ランク別の製造可能数</h2>
      ★1：<input id="rank1" type="number" value="0" min="0" style="width:60px;"><br>
      ★2：<input id="rank2" type="number" value="0" min="0" style="width:60px;"><br>
      ★3：<input id="rank3" type="number" value="0" min="0" style="width:60px;"><br>
    </div>

    <div class="section">
      <h2>④ カフェの空きスペース</h2>
      幅：<input id="cafeW" type="number" value="10" min="1" style="width:60px;">
      高さ：<input id="cafeH" type="number" value="10" min="1" style="width:60px;">
    </div>
  </div>

  <div class="section">
    <div class="btn" onclick="runCalc()">計算する</div>
  </div>

  <div class="section">
    <h2>⑤ 優先順位リスト</h2>
    <div id="resultList"></div>
  </div>

</div>

<script type="module">
import { characters, furnitures } from "./data.js";
import { calculatePriority } from "./logic.js";

// キャラ表示
const charGrid = document.getElementById("charGrid");
characters.forEach(c => {
  const div = document.createElement("div");
  div.className = "char-tile";
  div.textContent = c.name;
  div.onclick = () => div.classList.toggle("selected");
  charGrid.appendChild(div);
});

// 家具表示
const furnitureGrid = document.getElementById("furnitureGrid");
furnitures.forEach(f => {
  const div = document.createElement("div");
  div.className = "furniture-tile";

  // 画像パス（家具名.png）
  const imgPath = `./images/${f.name}.png`;

  div.innerHTML = `
    <img src="${imgPath}" 
         alt="${f.name}" 
         style="width:60px; height:40px; object-fit:cover; border-radius:4px; background:#ccc;"
         onerror="this.onerror=null; this.src='./images/dummy.png';">
    <div style="font-size:12px; margin-top:4px;">${f.name}</div>
    <input type="number" value="0" min="0" style="width:60px; margin-top:4px;">
  `;

  furnitureGrid.appendChild(div);
});

// 計算実行
window.runCalc = function() {
  const selectedCharacters = [...document.querySelectorAll(".char-tile.selected")].map(e => e.textContent);

  const ownedFurniture = [...document.querySelectorAll(".furniture-tile")].map((e, i) => ({
    id: furnitures[i].id,
    count: Number(e.querySelector("input").value)
  }));

  const craftLimits = {
    1: Number(document.getElementById("rank1").value),
    2: Number(document.getElementById("rank2").value),
    3: Number(document.getElementById("rank3").value),
  };

  const cafeSize = {
    w: Number(document.getElementById("cafeW").value),
    h: Number(document.getElementById("cafeH").value),
  };

  const results = calculatePriority(selectedCharacters, ownedFurniture, craftLimits, cafeSize);

  const resultList = document.getElementById("resultList");
  resultList.innerHTML = "";

  results.forEach((r, i) => {
    const div = document.createElement("div");
    div.className = "result-card";
    div.innerHTML = `
      <strong>#${i + 1}：${r.name}</strong><br>
      スコア：${r.score}
    `;
    resultList.appendChild(div);
  });
};
</script>

</body>
</html>
