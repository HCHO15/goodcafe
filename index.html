<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GoodCafe 配置ツール - タイルUI強化版</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ------------------------------
   基本レイアウト
------------------------------ */
body {
  margin: 0;
  background: #0f172a;
  color: #e2e8f0;
  font-family: system-ui, sans-serif;
}

header {
  padding: 12px 16px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

header h1 {
  margin: 0;
  font-size: 18px;
}

header .sub {
  font-size: 12px;
  color: #94a3b8;
}

/* ------------------------------
   キャラタイル（横スクロール）
------------------------------ */
#characterBar {
  display: flex;
  overflow-x: auto;
  gap: 8px;
  padding: 10px 12px;
  background: #0f172a;
  border-bottom: 1px solid #1e293b;
}

.char-tile {
  min-width: 80px;
  background: #1e293b;
  border-radius: 6px;
  padding: 6px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #334155;
}

.char-tile.selected {
  border-color: #38bdf8;
  background: #0ea5e9;
}

.char-tile img {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  object-fit: cover;
  background: #334155;
}

.char-name {
  font-size: 11px;
  margin-top: 4px;
  line-height: 1.2;
}

/* ------------------------------
   家具タイル（グリッド）
------------------------------ */
#furnitureGrid {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.furniture-tile {
  background: #1e293b;
  border-radius: 6px;
  border: 1px solid #334155;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.furniture-header {
  display: flex;
  gap: 6px;
}

.furniture-header img {
  width: 60px;
  height: 40px;
  border-radius: 4px;
  object-fit: cover;
  background: #334155;
}

.furniture-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.furniture-name {
  font-size: 12px;
  line-height: 1.2;
}

.furniture-rarity {
  font-size: 11px;
  color: #fbbf24;
}

.furniture-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.furniture-footer input {
  width: 50px;
  background: #0f172a;
  border: 1px solid #475569;
  border-radius: 4px;
  color: #e2e8f0;
  padding: 2px 4px;
}

/* ------------------------------
   設定パネル（折りたたみ）
------------------------------ */
#settingsPanel {
  background: #020617;
  border-top: 1px solid #1e293b;
  padding: 10px 12px;
}

#settingsContent {
  margin-top: 8px;
  display: none;
}

.settings-row {
  margin-bottom: 8px;
  font-size: 13px;
}

.settings-row input {
  width: 60px;
  background: #0f172a;
  border: 1px solid #475569;
  border-radius: 4px;
  color: #e2e8f0;
  padding: 2px 4px;
}

/* ------------------------------
   結果パネル（画面下固定）
------------------------------ */
#resultPanel {
  position: sticky;
  bottom: 0;
  background: #0f172a;
  border-top: 1px solid #1e293b;
  padding: 10px 12px;
}

.result-item {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 6px;
  margin-bottom: 6px;
}

.result-main {
  display: flex;
  justify-content: space-between;
}

.result-name {
  font-size: 12px;
}

.result-score {
  font-size: 12px;
  color: #a5b4fc;
}

.result-sub {
  font-size: 11px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>
  <h1>GoodCafe 配置ツール（強化タイルUI）</h1>
  <div class="sub">キャラ × 家具 × 所持数 × レアリティで優先度を自動計算</div>
</header>

<!-- キャラタイル（横スクロール） -->
<div id="characterBar"></div>

<!-- 家具タイル -->
<div id="furnitureGrid"></div>

<!-- 設定パネル -->
<div id="settingsPanel">
  <div id="settingsToggle" style="cursor:pointer; font-size:13px;">
    ▼ 設定（クリックで開閉）
  </div>

  <div id="settingsContent">
    <div class="settings-row">
      製造可能数：  
      ★1 <input id="make1" type="number" min="0" value="0">　
      ★2 <input id="make2" type="number" min="0" value="0">　
      ★3 <input id="make3" type="number" min="0" value="0">
    </div>

    <div class="settings-row">
      カフェ空きスペース：  
      <input id="cafeSpace" type="number" min="0" value="0">
    </div>
  </div>
</div>

<!-- 結果パネル -->
<div id="resultPanel">
  <div style="font-size:13px; margin-bottom:6px;">優先度（リアルタイム更新）</div>
  <div id="resultList"></div>
</div>

<!-- データ読み込み -->
<script src="./data.js"></script>

<script>
/* ============================================================
   キャラタイル生成
============================================================ */
const characterBar = document.getElementById("characterBar");
const selectedCharacters = new Set();

characters.forEach(c => {
  const div = document.createElement("div");
  div.className = "char-tile";
  div.dataset.id = c.id;

  div.innerHTML = `
    <img src="./images/characters/${c.name}.png"
         onerror="this.src='./images/characters/dummy.png'">
    <div class="char-name">${c.name}</div>
  `;

  div.addEventListener("click", () => {
    if (selectedCharacters.has(c.id)) {
      selectedCharacters.delete(c.id);
      div.classList.remove("selected");
    } else {
      selectedCharacters.add(c.id);
      div.classList.add("selected");
    }
    recalc();
  });

  characterBar.appendChild(div);
});

/* ============================================================
   家具タイル生成
============================================================ */
const furnitureGrid = document.getElementById("furnitureGrid");
const furnitureCount = new Map();

furnitures.forEach(f => {
  const div = document.createElement("div");
  div.className = "furniture-tile";

  const imgPath = `./images/furniture/${f.name}.png`;
  const rarityStars = "★".repeat(f.rarity);

  div.innerHTML = `
    <div class="furniture-header">
      <img src="${imgPath}"
           onerror="this.src='./images/furniture_dummy/dummy.png'">
      <div class="furniture-meta">
        <div class="furniture-name">${f.name}</div>
        <div class="furniture-rarity">${rarityStars}</div>
      </div>
    </div>

    <div class="furniture-footer">
      <span style="font-size:11px;">所持</span>
      <input type="number" min="0" value="0" data-id="${f.id}">
    </div>
  `;

  const input = div.querySelector("input");
  input.addEventListener("input", () => {
    furnitureCount.set(f.id, Number(input.value));
    recalc();
  });

  furnitureGrid.appendChild(div);
});

/* ============================================================
   設定パネル開閉
============================================================ */
document.getElementById("settingsToggle").addEventListener("click", () => {
  const c = document.getElementById("settingsContent");
  c.style.display = c.style.display === "block" ? "none" : "block";
});

/* ============================================================
   優先度計算（簡易版）
============================================================ */
const resultList = document.getElementById("resultList");

function recalc() {
  const make1 = Number(document.getElementById("make1").value);
  const make2 = Number(document.getElementById("make2").value);
  const make3 = Number(document.getElementById("make3").value);

  const results = [];

  furnitures.forEach(f => {
    const count = furnitureCount.get(f.id) || 0;
    if (count === 0) return;

    // 対応キャラ数
    const related = furnitureCharacterMap.filter(x => x.furnitureId === f.id);
    const matchCount = related.filter(x => selectedCharacters.has(x.characterId)).length;

    // 製造可能数補正
    const makeBonus = (f.rarity === 1 ? make1 : f.rarity === 2 ? make2 : make3);

    const score = (matchCount * 10) + (f.rarity * 3) + (count * 2) + makeBonus;

    results.push({
      name: f.name,
      rarity: f.rarity,
      count,
      matchCount,
      score
    });
  });

  results.sort((a, b) => b.score - a.score);

  resultList.innerHTML = "";
  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "result-item";

    div.innerHTML = `
      <div class="result-main">
        <div class="result-name">${r.name}</div>
        <div class="result-score">${r.score}</div>
      </div>
      <div class="result-sub">
        対応キャラ: ${r.matchCount} / 所持: ${r.count} / ★${r.rarity}
      </div>
    `;

    resultList.appendChild(div);
  });
}

recalc();
</script>

</body>
</html>
