<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>育成支援ツール（1画面プロトタイプ）</title>
<style>
  body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
  h2 { margin: 10px 0; }
  .container { padding: 16px; }
  .section { background: white; padding: 12px; margin-bottom: 16px; border-radius: 8px; }
  .char-item, .furniture-item { padding: 8px; background: #fafafa; margin: 6px 0; border-radius: 6px; cursor: pointer; }
  .selected { border: 2px solid #007bff; }
  .btn { padding: 10px 16px; background: #007bff; color: white; border-radius: 6px; display: inline-block; cursor: pointer; margin-top: 10px; }
  .result-card { background: white; padding: 12px; margin: 10px 0; border-radius: 8px; }
</style>
</head>
<body>

<div class="container">

  <!-- キャラ選択 -->
  <div class="section">
    <h2>① 育成したいキャラを選択</h2>
    <div id="charList"></div>
  </div>

  <!-- 家具所持数 -->
  <div class="section">
    <h2>② 家具の所持数</h2>
    <div id="furnitureList"></div>
  </div>

  <!-- ランク別製造可能数 -->
  <div class="section">
    <h2>③ ランク別の製造可能数</h2>
    <div>
      初級：<input id="rank1" type="number" value="0" min="0" style="width:60px;"><br>
      中級：<input id="rank2" type="number" value="0" min="0" style="width:60px;"><br>
      上級：<input id="rank3" type="number" value="0" min="0" style="width:60px;"><br>
      最上級：<input id="rank4" type="number" value="0" min="0" style="width:60px;"><br>
    </div>
  </div>

  <!-- カフェ空きスペース -->
  <div class="section">
    <h2>④ カフェの空きスペース</h2>
    幅：<input id="cafeW" type="number" value="10" min="1" style="width:60px;">
    高さ：<input id="cafeH" type="number" value="10" min="1" style="width:60px;">
  </div>

  <!-- 計算ボタン -->
  <div class="section">
    <div class="btn" onclick="calculate()">計算する（ダミー）</div>
  </div>

  <!-- 結果 -->
  <div class="section">
    <h2>⑤ 優先順位リスト（ダミー）</h2>
    <div id="resultList"></div>
  </div>

</div>

<script>
// -----------------------------
// ダミーデータ
// -----------------------------
const characters = [
  { id: 1, name: "アコ" },
  { id: 2, name: "ヒナ" },
  { id: 3, name: "トキ" },
  { id: 4, name: "アズサ" },
];

const furnitures = [
  { id: 1, name: "ぬいぐるみ（初級）" },
  { id: 2, name: "大きなソファ（中級）" },
  { id: 3, name: "高級テーブル（上級）" },
  { id: 4, name: "黄金の像（最上級）" },
];

// -----------------------------
// キャラ一覧
// -----------------------------
const charList = document.getElementById("charList");
characters.forEach(c => {
  const div = document.createElement("div");
  div.className = "char-item";
  div.textContent = c.name;
  div.onclick = () => div.classList.toggle("selected");
  charList.appendChild(div);
});

// -----------------------------
// 家具所持数
// -----------------------------
const furnitureList = document.getElementById("furnitureList");
furnitures.forEach(f => {
  const div = document.createElement("div");
  div.className = "furniture-item";
  div.innerHTML = `
    <strong>${f.name}</strong><br>
    所持数：<input type="number" value="0" min="0" style="width:60px;">
  `;
  furnitureList.appendChild(div);
});

// -----------------------------
// ダミー計算
// -----------------------------
function calculate() {
  const resultList = document.getElementById("resultList");
  resultList.innerHTML = ""; // 初期化

  const dummyResults = [
    { rank: 1, name: "黄金の像（最上級）", score: 95 },
    { rank: 2, name: "高級テーブル（上級）", score: 80 },
    { rank: 3, name: "大きなソファ（中級）", score: 60 },
  ];

  dummyResults.forEach(r => {
    const div = document.createElement("div");
    div.className = "result-card";
    div.innerHTML = `
      <strong>#${r.rank}：${r.name}</strong><br>
      スコア：${r.score}
    `;
    resultList.appendChild(div);
  });
}
</script>

</body>
</html>
